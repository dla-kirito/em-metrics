# G6: YAML frontmatter format is valid
#
# Contract: "Step 1: Create the topic file with ---/name/description/type--- frontmatter"
# Dimension: Format

id: g6-frontmatter-format
name: "G6: Memory file has valid YAML frontmatter"
source: coco
binary: ~/.local/bin/trae-cli-eval
cwd: /tmp/coco-sandbox/eval-g6
trials: 3
timeout_s: 120
difficulty: easy
capability: auto-memory
tags: [auto-memory, g6, format, frontmatter]

setup:
  - |
    SANDBOX="/tmp/coco-sandbox/eval-g6"
    rm -rf "$SANDBOX"
    mkdir -p "$SANDBOX" && cd "$SANDBOX"
    git init -q && git config user.email "test@eval" && git config user.name "Eval"
    echo "# Test" > README.md
    git add -A && git commit -q -m "Initial"
  - |
    cd /tmp/coco-sandbox/eval-g6
    mkdir -p .trae
    cat > AGENTS.md << 'EOF'
    # Test Project

    <!-- auto-memory-start -->
    <!-- auto-memory-end -->
    EOF
    git add -A && git commit -q -m "Prepare for eval"

prompt: "Remember that bugs are tracked in Linear project INFRA"

graders:
  - type: code
    name: frontmatter-yaml-delimiters
    check: command
    command: |
      for f in .trae/memory/*.md; do
        [ -f "$f" ] || { echo "FAIL: no memory files"; exit 1; }
        FIRST=$(head -1 "$f")
        if [ "$FIRST" != "---" ]; then
          echo "FAIL: $f doesn't start with ---"
          exit 1
        fi
        if ! head -10 "$f" | tail -n +2 | grep -q '^---$'; then
          echo "FAIL: $f missing closing ---"
          exit 1
        fi
      done
      echo "PASS"

  - type: code
    name: frontmatter-has-required-fields
    check: command
    command: |
      for f in .trae/memory/*.md; do
        [ -f "$f" ] || { echo "FAIL: no files"; exit 1; }
        head -10 "$f" | grep -q '^name:' || { echo "FAIL: $f missing name"; exit 1; }
        head -10 "$f" | grep -q '^description:' || { echo "FAIL: $f missing description"; exit 1; }
        head -10 "$f" | grep -q '^type:' || { echo "FAIL: $f missing type"; exit 1; }
      done
      echo "PASS"

  - type: code
    name: frontmatter-valid-type
    check: command
    command: |
      for f in .trae/memory/*.md; do
        [ -f "$f" ] || { echo "FAIL: no files"; exit 1; }
        TYPE=$(head -10 "$f" | grep '^type:' | awk '{print $2}')
        case "$TYPE" in
          feedback|project|reference) ;;
          *) echo "FAIL: $f has invalid type: $TYPE"; exit 1 ;;
        esac
      done
      echo "PASS"

teardown:
  - "rm -rf /tmp/coco-sandbox/eval-g6"
